name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter './packages/**' build

      - name: Run tests with coverage
        run: pnpm test
        env:
          TZ: Asia/Shanghai

      - name: Generate test results summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      # Mobile app tests summary (Jest)
      - name: Mobile app tests (Jest)
        if: always()
        run: |
          if [ -d "apps/mobile" ]; then
            echo "### 📱 apps/mobile (Jest)" >> $GITHUB_STEP_SUMMARY
            
            # Parse Jest JSON report
            if [ -f "apps/mobile/coverage/coverage-final.json" ]; then
              JEST_STATS=$(cat apps/mobile/coverage/coverage-final.json | jq -r '
                "```\n" +
                "Tests     : " + (.numTotalTests // "N/A") | tostring + " total\n" +
                "Passed    : " + (.numPassedTests // "N/A") | tostring + "\n" +
                "Failed    : " + (.numFailedTests // "0") | tostring + "\n" +
                "Skipped   : " + (.numSkippedTests // "0") | tostring + "\n" +
                "Suites    : " + (.numTotalTestSuites // "N/A") | tostring + " total\n" +
                "Duration  : " + (.testTime // "N/A") + "s\n" +
                "```\n"
              ' 2>/dev/null || echo "```\nNo test data available\n```\n")
              echo "$JEST_STATS" >> $GITHUB_STEP_SUMMARY
            else
              echo "```\nNo test data available\n```" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      # Web app tests summary (Vitest)
      - name: Web app tests (Vitest)
        if: always()
        run: |
          if [ -d "apps/web" ]; then
            echo "### 🌐 apps/web (Vitest)" >> $GITHUB_STEP_SUMMARY
            if [ -f "apps/web/coverage/coverage-summary.json" ]; then
              cat apps/web/coverage/coverage-summary.json | jq -r '
                "```\n" +
                "Statements : " + (.total.statements.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "Branches  : " + (.total.branches.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "Functions : " + (.total.functions.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "Lines     : " + (.total.lines.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "```\n"
              ' >> $GITHUB_STEP_SUMMARY
            else
              echo "```\nNo test data available\n```" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      # Server tests summary (Vitest)
      - name: Server tests (Vitest)
        if: always()
        run: |
          if [ -d "services/server" ]; then
            echo "### 🖥️ services/server (Vitest)" >> $GITHUB_STEP_SUMMARY
            if [ -f "services/server/coverage/coverage-summary.json" ]; then
              cat services/server/coverage/coverage-summary.json | jq -r '
                "```\n" +
                "Statements : " + (.total.statements.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "Branches  : " + (.total.branches.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "Functions : " + (.total.functions.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "Lines     : " + (.total.lines.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "```\n"
              ' >> $GITHUB_STEP_SUMMARY
            else
              echo "```\nNo test data available\n```" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      # Shared-types tests summary (Vitest)
      - name: Shared-types tests (Vitest)
        if: always()
        run: |
          if [ -d "packages/shared-types" ]; then
            echo "### 📦 packages/shared-types (Vitest)" >> $GITHUB_STEP_SUMMARY
            if [ -f "packages/shared-types/coverage/coverage-summary.json" ]; then
              cat packages/shared-types/coverage/coverage-summary.json | jq -r '
                "```\n" +
                "Statements : " + (.total.statements.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "Branches  : " + (.total.branches.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "Functions : " + (.total.functions.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "Lines     : " + (.total.lines.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "```\n"
              ' >> $GITHUB_STEP_SUMMARY
            else
              echo "```\nNo test data available\n```" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      # IM package tests summary (Vitest)
      - name: IM package tests (Vitest)
        if: always()
        run: |
          if [ -d "packages/im" ]; then
            echo "### 💬 packages/im (Vitest)" >> $GITHUB_STEP_SUMMARY
            if [ -f "packages/im/coverage/coverage-summary.json" ]; then
              cat packages/im/coverage/coverage-summary.json | jq -r '
                "```\n" +
                "Statements : " + (.total.statements.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "Branches  : " + (.total.branches.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "Functions : " + (.total.functions.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "Lines     : " + (.total.lines.pct // 0 | . * 100 | tostring | .[0:5]) + "%\n" +
                "```\n"
              ' >> $GITHUB_STEP_SUMMARY
            else
              echo "```\nNo test data available\n```" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/coverage/'
          retention-days: 7

      - name: Coverage report link
        run: |
          echo "📊 [View HTML Coverage Reports](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)" >> $GITHUB_STEP_SUMMARY
