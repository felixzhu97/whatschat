name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sunday at 2 AM
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Upload audit results
        if: always()
        run: |
          pnpm audit --audit-level=high --json > audit-results.json 2>&1 || true
        continue-on-error: true

      - name: Post audit summary
        if: always()
        run: |
          echo "## Dependency Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "audit-results.json" ]; then
            VULNS=$(cat audit-results.json | jq '.metadata.vulnerabilities | to_entries | map("\(.key): \(.value)") | join(", ")' 2>/dev/null || echo "Unable to parse")
            echo "**Vulnerabilities found:** $VULNS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "📋 [View full audit report](https://github.com/${{ github.repository }}/security/dependabot)" >> $GITHUB_STEP_SUMMARY

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          only_verify: false

  sast-scan:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            auto,
            framework,
            javascript,
            typescript,
            nodejs,
            react,
            secrets
          upload: true

  docker-scan:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [dependency-audit]

    steps:
      - uses: actions/checkout@v4

      - name: Check for Dockerfiles
        id: check_docker
        run: |
          DOCKERFILES=$(find . -name "Dockerfile*" -o -name "docker-compose*.yml" 2>/dev/null | head -10)
          if [ -n "$DOCKERFILES" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "files=$DOCKERFILES" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check_docker.outputs.found == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Run Trivy vulnerability scanner
        if: steps.check_docker.outputs.found == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        if: steps.check_docker.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript
          queries: security-and-quality

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Review Dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licensed: true

  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [dependency-audit, secret-scanning, sast-scan, codeql-analysis]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Collect results from each job
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Dependency Audit
          if [[ "${{ needs.dependency-audit.result }}" == "success" ]]; then
            echo "| Dependency Audit | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Dependency Audit | ⚠️ Warnings (check audit report) |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Secret Scanning
          if [[ "${{ needs.secret-scanning.result }}" == "success" ]]; then
            echo "| Secret Scanning | ✅ No secrets found |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Secret Scanning | ❌ Secrets detected |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # SAST Scan
          if [[ "${{ needs.sast-scan.result }}" == "success" ]]; then
            echo "| SAST (Semgrep) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SAST (Semgrep) | ⚠️ Issues found |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # CodeQL
          if [[ "${{ needs.codeql-analysis.result }}" == "success" ]]; then
            echo "| CodeQL Analysis | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| CodeQL Analysis | ⚠️ Issues found |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View Security tab](https://github.com/${{ github.repository }}/security)" >> $GITHUB_STEP_SUMMARY
