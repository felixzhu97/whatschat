name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check-types

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Python services tests
        run: |
          if [ -d "services/rag" ] && [ -f "services/rag/pyproject.toml" ]; then
            cd services/rag
            python -m pytest tests/ -v --tb=short
            cd ../..
          fi
